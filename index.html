<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NZ Business Brochures</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b0b17;color:#fff;padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:2em;background:linear-gradient(135deg,#6366f1,#d946ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;text-align:center}
.sub{color:rgba(255,255,255,.4);margin-bottom:8px;text-align:center}
.meta{color:rgba(255,255,255,.25);font-size:.82em;margin-bottom:30px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:1000px;width:100%}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px;text-decoration:none;color:#fff;transition:all .3s}
.card:hover{background:rgba(255,255,255,.08);transform:translateY(-3px);border-color:rgba(99,102,241,.3)}
.card h3{font-size:1em;margin-bottom:4px;font-weight:600}
.card .phone{color:rgba(255,255,255,.4);font-size:.82em;margin-bottom:6px}
.tag{display:inline-block;background:rgba(99,102,241,.15);color:#818cf8;padding:2px 10px;border-radius:20px;font-size:.75em}
.empty{color:rgba(255,255,255,.3);text-align:center;padding:40px}
</style>
</head>
<body>
<h1>NZ Business Brochures</h1>
<p class="sub">Professional brochure websites for local businesses</p>
<p class="meta">Last updated: 01 July 2026 · 1 brochures</p>
<div class="grid" id="grid">
<a href="https://goodwebsitenz.github.io/nz-brochures/new-plymouth-plumbing/" class="card"><h3>New Plymouth Plumbing</h3><p class="phone">06 769 6606</p><span class="tag">View Brochure →</span></a>
</div>
</body>
</html>
